name: Daily Stock Reports

on:
  schedule:
    # Run at 9:30 AM IST (4:00 AM UTC) — market open, Mon-Fri
    - cron: '0 4 * * 1-5'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  issues: write

jobs:
  generate-reports:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install yfinance pandas requests beautifulsoup4 lxml

      - name: Generate NSE reports
        run: |
          python3 report_generator.py --watchlist watchlist.txt --alerts --delay 8 -o ./reports/
          echo "NSE_SUMMARY<<EOF" >> $GITHUB_ENV
          cat ./reports/DAILY_SUMMARY.md >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Generate US reports
        run: |
          python3 us_report_generator.py --watchlist us_watchlist.txt --alerts -o ./us_reports/
          echo "US_SUMMARY<<EOF" >> $GITHUB_ENV
          cat ./us_reports/DAILY_SUMMARY.md >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Generate NSE F&O index outlook (NIFTY / BANK NIFTY)
        run: python3 fno_report_generator.py -o ./fno_reports/

      - name: Generate sector rotation report
        run: python3 sector_report_generator.py -o ./sector_reports/

      - name: Generate dashboard index
        run: python3 dashboard_generator.py -r . -o ./index.html

      - name: Check for value-buy alerts
        id: check_alerts
        run: |
          NSE_ALERTS=false
          if grep -q "Value Buy Opportunities" ./reports/DAILY_SUMMARY.md; then NSE_ALERTS=true; fi
          
          US_ALERTS=false
          if grep -q "Value Buy Opportunities" ./us_reports/DAILY_SUMMARY.md; then US_ALERTS=true; fi
          
          if [ "$NSE_ALERTS" = "true" ] || [ "$US_ALERTS" = "true" ]; then
            echo "has_alerts=true" >> $GITHUB_OUTPUT
          else
            echo "has_alerts=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit reports and README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f reports/ us_reports/ sector_reports/ fno_reports/ index.html README.md
          git diff --cached --quiet || git commit -m "📊 Daily stock reports & README update — $(date +%Y-%m-%d)"
          git push

      - name: Create GitHub Issue for alerts
        if: steps.check_alerts.outputs.has_alerts == 'true'
        uses: actions/github-script@v7
        env:
          NSE_SUMMARY: ${{ env.NSE_SUMMARY }}
          US_SUMMARY: ${{ env.US_SUMMARY }}
        with:
          script: |
            const nseSummary = process.env.NSE_SUMMARY || '';
            const usSummary = process.env.US_SUMMARY || '';
            const today = new Date().toISOString().split('T')[0];
            
            let body = '# 🔔 Combined Value Buy Alerts\n\n';
            
            if (nseSummary.includes('Value Buy Opportunities')) {
              body += '## 🇮🇳 NSE Market\n' + nseSummary.split('## 📋 Full Watchlist Summary')[0] + '\n';
            }
            
            if (usSummary.includes('Value Buy Opportunities')) {
              body += '## 🇺🇸 US Market\n' + usSummary.split('## 📋 Full Watchlist Summary')[0] + '\n';
            }
            
            body += '\n---\n*Auto-generated by Daily Stock Reports workflow*';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔔 Value Buy Alert — ${today}`,
              body: body,
              labels: ['value-buy', 'automated']
            });


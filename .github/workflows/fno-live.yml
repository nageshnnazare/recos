name: Deploy Dashboard (GitHub Pages)

on:
  workflow_run:
    workflows: ["Daily Stock Reports"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Pages site
        run: |
          mkdir -p _site

          for dir in reports us_reports sector_reports fno_reports sp500_reports; do
            if [ -d "$dir" ]; then
              cp -r "$dir" "_site/$dir"
            else
              mkdir -p "_site/$dir"
            fi
          done

          # Use the dashboard generated by daily-reports (committed to repo)
          if [ -f index.html ]; then
            cp index.html _site/index.html
          fi
          if [ -f live.html ]; then
            cp live.html _site/live.html
          fi
          if [ -f .nojekyll ]; then
            cp .nojekyll _site/.nojekyll
          fi

      - name: Upload Pages artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

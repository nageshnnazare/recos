<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Market Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,400..700;1,9..40,400..700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#08090d; --bg2:#0d0e14; --bg3:#12131a; --bg4:#181922;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
  --text:#e8e9f0; --text2:#9899a8; --text3:#5c5d6e;
  --green:#00e5a0; --red:#ff4d6d; --blue:#3d9cf5; --purple:#9b7fff;
  --mono:'Fira Code',monospace; --sans:'DM Sans',sans-serif;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--text); font-family:var(--sans); font-size:13px; line-height:1.6; -webkit-font-smoothing:antialiased; }
.page { max-width:1240px; margin:0 auto; padding:24px 22px 60px; }

.hero { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; padding:10px 0 16px; border-bottom:1px solid var(--border); margin-bottom:16px; }
.hero-title { font-family:var(--mono); font-size:15px; font-weight:700; color:#fff; letter-spacing:-0.3px; }
.hero-sub { font-family:var(--mono); font-size:10px; color:var(--text3); margin-top:2px; }
.hero-right { display:flex; align-items:center; gap:14px; }
.live-badge { display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:10px; font-weight:700; color:var(--red); letter-spacing:1px; }
.live-dot { width:8px; height:8px; border-radius:50%; background:var(--red); animation:pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(255,77,109,.6)} 50%{opacity:.7;box-shadow:0 0 0 6px rgba(255,77,109,0)} }
.back-btn { font-family:var(--mono); font-size:11px; font-weight:600; color:var(--text2);
  text-decoration:none; padding:6px 14px; border-radius:6px;
  background:var(--bg4); border:1px solid var(--border2); transition:all .15s; }
.back-btn:hover { color:#fff; border-color:var(--text3); }

/* ── Controls ── */
.ctrl-row { display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-bottom:12px; }
.ctrl-group { display:flex; align-items:center; gap:3px; }
.ctrl-label { font-family:var(--mono); font-size:9px; color:var(--text3); text-transform:uppercase; letter-spacing:1px; margin-right:6px; white-space:nowrap; }
.ctrl-btn { background:var(--bg4); border:1px solid var(--border); color:var(--text3); font-family:var(--mono);
  font-size:10px; padding:4px 9px; border-radius:5px; cursor:pointer; transition:all .15s; white-space:nowrap; }
.ctrl-btn:hover { color:var(--text); border-color:var(--border2); }
.ctrl-btn.active { color:#fff; background:var(--bg3); border-color:var(--blue); }
.ctrl-btn.view-active { border-color:var(--green); }
.ctrl-sep { width:1px; height:18px; background:var(--border); margin:0 4px; }

/* ── Chart grid ── */
.chart-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
@media(max-width:1000px) { .chart-grid { grid-template-columns:repeat(2,1fr); } }
@media(max-width:600px)  { .chart-grid { grid-template-columns:1fr; } }

.chart-card { background:var(--bg2); border:1px solid var(--border); border-radius:12px;
  position:relative; overflow:hidden; height:260px; transition:border-color .2s, height .3s; }
.chart-card:hover { border-color:var(--border2); }
.chart-card .tradingview-widget-container { position:relative; z-index:1; width:100%; height:100%; }
.chart-card .tradingview-widget-container__widget { width:100%; height:100%; }
.chart-card iframe { width:100% !important; height:100% !important; border:0; display:block; }
.chart-card .tradingview-widget-copyright { display:none !important; }

.chart-grid.compact  .chart-card { height:190px; }
.chart-grid.expanded .chart-card { height:380px; }
.chart-grid.expanded { grid-template-columns:repeat(2,1fr); }
@media(max-width:600px) { .chart-grid.expanded { grid-template-columns:1fr; } }

.footer { text-align:center; margin-top:40px; padding:20px; font-family:var(--mono); font-size:9px; color:var(--text3); line-height:1.8; }
.footer a { color:var(--blue); text-decoration:none; }
.footer a:hover { text-decoration:underline; }
</style>
</head>
<body>
<div class="page">
  <div class="hero">
    <div>
      <div class="hero-title">Live Market Dashboard</div>
      <div class="hero-sub">Real-time streaming · Powered by TradingView</div>
    </div>
    <div class="hero-right">
      <span class="live-badge"><span class="live-dot"></span> LIVE</span>
      <a href="index.html" class="back-btn">&#8592; Dashboard</a>
    </div>
  </div>

  <div class="ctrl-row">
    <div class="ctrl-group">
      <span class="ctrl-label">Span</span>
      <button class="ctrl-btn" data-range="1D">1D</button>
      <button class="ctrl-btn active" data-range="1M">1M</button>
      <button class="ctrl-btn" data-range="3M">3M</button>
      <button class="ctrl-btn" data-range="12M">1Y</button>
      <button class="ctrl-btn" data-range="60M">5Y</button>
      <button class="ctrl-btn" data-range="ALL">ALL</button>
    </div>
    <div class="ctrl-sep"></div>
    <div class="ctrl-group">
      <span class="ctrl-label">View</span>
      <button class="ctrl-btn" data-view="compact">Compact</button>
      <button class="ctrl-btn view-active" data-view="normal">Normal</button>
      <button class="ctrl-btn" data-view="expanded">Expanded</button>
    </div>
  </div>

  <div class="chart-grid" id="chart-grid"></div>

  <div class="footer">
    Real-time data by <a href="https://www.tradingview.com" target="_blank" rel="noopener">TradingView</a><br>
    <a href="https://github.com/nageshnnazare/recos">github.com/nageshnnazare/recos</a> · Not financial advice
  </div>
</div>

<script>
const CHARTS = [
  { symbol:"AMEX:INDA",         label:"INDIA (INDA)",    color:"#3d9cf5" },
  { symbol:"FOREXCOM:SPXUSD",   label:"S&P 500",         color:"#9b7fff" },
  { symbol:"FX_IDC:USDINR",     label:"USD / INR",       color:"#d48820" },
  { symbol:"AMEX:UVXY",         label:"VIX (UVXY)",      color:"#ff4d6d" },
  { symbol:"AMEX:UUP",          label:"DOLLAR (UUP)",    color:"#e04098" },
  { symbol:"TVC:GOLD",          label:"GOLD",            color:"#ffd447" },
  { symbol:"TVC:SILVER",        label:"SILVER",          color:"#9ca3af" },
  { symbol:"NASDAQ:TLT",        label:"US BOND (TLT)",   color:"#48d1cc" },
  { symbol:"TVC:USOIL",         label:"CRUDE OIL",       color:"#00e5a0" },
];

const MINI_RANGE = {"1D":"1D","1M":"1M","3M":"3M","12M":"12M","60M":"60M","ALL":"ALL"};
let cfg = { range:"1M", view:"normal" };

function hexRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function buildCharts() {
  const grid = document.getElementById('chart-grid');
  grid.innerHTML = '';
  const dateRange = MINI_RANGE[cfg.range] || '3M';

  CHARTS.forEach(idx => {
    const card = document.createElement('div');
    card.className = 'chart-card';

    const wrap = document.createElement('div');
    wrap.className = 'tradingview-widget-container';
    wrap.style.cssText = 'width:100%;height:100%;';

    const wdiv = document.createElement('div');
    wdiv.className = 'tradingview-widget-container__widget';
    wrap.appendChild(wdiv);

    const script = document.createElement('script');
    script.type = 'text/javascript';
    script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js';
    script.async = true;
    script.textContent = JSON.stringify({
      symbol: idx.symbol,
      width: "100%",
      height: "100%",
      locale: "en",
      dateRange: dateRange,
      colorTheme: "dark",
      trendLineColor: idx.color,
      underLineColor: hexRgba(idx.color, 0.15),
      underLineBottomColor: hexRgba(idx.color, 0),
      isTransparent: true,
      autosize: true,
      largeChartUrl: ""
    });
    wrap.appendChild(script);
    card.appendChild(wrap);
    grid.appendChild(card);
  });
}

document.querySelectorAll('.ctrl-btn[data-range]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.ctrl-btn[data-range]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    cfg.range = btn.dataset.range;
    buildCharts();
  });
});

document.querySelectorAll('.ctrl-btn[data-view]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.ctrl-btn[data-view]').forEach(b => b.classList.remove('view-active'));
    btn.classList.add('view-active');
    cfg.view = btn.dataset.view;
    const grid = document.getElementById('chart-grid');
    grid.classList.remove('compact','expanded');
    if (cfg.view !== 'normal') grid.classList.add(cfg.view);
  });
});

buildCharts();
</script>
</body>
</html>
